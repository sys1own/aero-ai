name: Autonomous Self-Evolution Loop
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Maximum evolutionary run duration'
        required: true
        default: '20 min'
        type: choice
        options:
          - '5 min'
          - '20 min'
          - '1 h'
          - '6 h'

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute Local Optimization Loop
        run: |
          REPO_ROOT=$(pwd)
          EVOLVE_SCRIPT=$(find . -name "evolve_loop.py" -print -quit)
          SCRIPT_DIR=$(dirname "$EVOLVE_SCRIPT")
          cd "$SCRIPT_DIR"
          export PYTHONPATH="$PYTHONPATH:$REPO_ROOT"

          # Compute explicit execution windows
          RAW_INPUT="${{ github.event.inputs.duration }}"
          NUM=$(echo "$RAW_INPUT" | awk '{print $1}')
          if [ "$(echo "$RAW_INPUT" | awk '{print $2}')" = "h" ]; then SECONDS=$((NUM * 3600)); else SECONDS=$((NUM * 60)); fi

          # Authenticate the runner so the loop can push champions.
          git remote set-url origin https://${{ github.token }}@github.com/sys1own/aero-ai.git

          # The mutation engine is fully local — no API keys, no network calls.
          # Accepted champions are committed and pushed to a DEDICATED branch so
          # autonomous, machine-generated edits never land on main without review.
          python evolve_loop.py --duration "$SECONDS" --push --push-branch "evolution/auto-champions"

      - name: Post-Build Workspace Sanitation
        run: |
          echo "🧹 Clearing local evaluation scratch..."
          rm -rf build_sandbox/_runtime || true
