name: Autonomous Self-Evolution Loop
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Maximum evolutionary run duration'
        required: true
        default: '20 min'
        type: choice
        options:
          - '5 min'
          - '20 min'
          - '1 h'
          - '6 h'

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants the runner explicit permission to commit back to main
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute Optimization Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python evolve_loop.py --duration "${{ github.event.inputs.duration }}"

      - name: Post-Build Workspace Sanitation (The Purge)
        run: |
          echo "🧹 Wiping temporary orchestration files and testing sets from workspace..."
          rm -f llm_client.py evolve_loop.py
          rm -rf aero_mesh_core/testbed/

      - name: Deploy Optimized Static Bytecode to Production
        run: |
          git config --global user.name "Aero Evolution Engine"
          git config --global user.email "evolute@aero-auto-sdk.local"
          
          # Stage the frozen distribution output targets
          git add aero_mesh_core/dist/* || true
          
          # Only commit and push if the loop successfully improved the bytecode
          if git diff-index --quiet HEAD; then
            echo "No optimization anomalies or performance improvements to freeze."
          else
            git commit -m "chore: freeze hyper-optimized static aero bytecode [duration: ${{ github.event.inputs.duration }}]"
            git push origin main
          fi
