name: Autonomous Self-Evolution Loop
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Maximum evolutionary run duration'
        required: true
        default: '20 min'
        type: choice
        options:
          - '5 min'
          - '20 min'
          - '1 h'
          - '6 h'

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Execute Optimization Loop
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          REPO_ROOT=$(pwd)
          EVOLVE_SCRIPT=$(find . -name "evolve_loop.py" -print -quit)
          SCRIPT_DIR=$(dirname "$EVOLVE_SCRIPT")
          cd "$SCRIPT_DIR"
          export PYTHONPATH="$PYTHONPATH:$REPO_ROOT"
          
          # Compute explicit execution windows
          RAW_INPUT="${{ github.event.inputs.duration }}"
          NUM=$(echo "$RAW_INPUT" | awk '{print $1}')
          if [ "$(echo "$RAW_INPUT" | awk '{print $2}')" = "h" ]; then SECONDS=$((NUM * 3600)); else SECONDS=$((NUM * 60)); fi
          
          # Setup push credentials natively in the git configuration block before starting loop
          git config --global user.name "Aero Evolution Engine"
          git config --global user.email "evolute@aero-auto-sdk.local"
          git remote set-url origin https://${{ github.token }}@github.com/sys1own/aero-ai.git
          
          python evolve_loop.py --duration "$SECONDS"

      - name: Post-Build Workspace Sanitation (The Purge)
        run: |
          echo "🧹 Wiping temporary orchestration scripts and testing sets..."
          find . -name "llm_client.py" -delete
          find . -name "evolve_loop.py" -delete
          find . -type d -name "testbed" -exec rm -rf {} + || true
